<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강화 게임</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: rgba(255, 255, 255, 0.06);
      --panel-strong: rgba(255, 255, 255, 0.1);
      --line: rgba(255, 255, 255, 0.12);
      --line-strong: rgba(255, 255, 255, 0.18);
      --text: #f5f7fb;
      --muted: #a7b0c0;
      --accent: #7c9cff;
      --accent-strong: #5d82ff;
      --success: #57c785;
      --warning: #ffb454;
      --danger: #ff6b6b;
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background:
        radial-gradient(circle at top, rgba(124, 156, 255, 0.16), transparent 30%),
        linear-gradient(180deg, #171a21 0%, #0c0e13 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .game-frame {
      width: min(440px, 100%);
      min-height: 790px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.03) 100%);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 22px 18px 24px;
      position: relative;
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .game-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent 34%, transparent 66%, rgba(124,156,255,0.06));
      pointer-events: none;
    }

    .top-row,
    .content-area,
    .message,
    .hint {
      position: relative;
      z-index: 1;
    }

    .top-row {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 22px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .outlined-box {
      background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
      border: 1px solid var(--line-strong);
      border-radius: 18px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow:
        0 10px 24px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255,255,255,0.08);
      user-select: none;
      color: var(--text);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    button.outlined-box,
    .small-btn,
    .ground-chip,
    .monster-card {
      font: inherit;
      color: inherit;
    }

    .shop-box,
    .mode-box,
    .attempt-box,
    .small-btn,
    .ground-chip,
    .monster-card {
      transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease, filter 0.14s ease, background 0.14s ease;
    }

    .shop-box,
    .mode-box {
      min-width: 98px;
      text-align: center;
      cursor: pointer;
    }

    .shop-box:hover,
    .mode-box:hover,
    .small-btn:hover,
    .ground-chip:hover,
    .monster-card:hover:not(:disabled),
    .attempt-box:hover:not(:disabled) {
      transform: translateY(-2px);
    }

    .shop-box:hover,
    .mode-box:hover,
    .small-btn:hover,
    .ground-chip:hover {
      border-color: rgba(124, 156, 255, 0.32);
    }

    .mode-box.active {
      background: linear-gradient(180deg, rgba(124,156,255,0.95) 0%, rgba(93,130,255,0.92) 100%);
      color: #ffffff;
      border-color: rgba(154, 177, 255, 0.35);
      box-shadow:
        0 16px 28px rgba(42, 72, 170, 0.3),
        inset 0 1px 0 rgba(255,255,255,0.16);
    }

    .gold-box {
      width: fit-content;
      min-width: 120px;
      text-align: center;
      font-size: 0.96rem;
      color: #ffe08a;
      letter-spacing: 0.01em;
    }

    .content-area {
      min-height: 610px;
      display: flex;
      flex-direction: column;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .center-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .weapon-name-box {
      min-width: 170px;
      text-align: center;
      font-size: 1.04rem;
      padding-inline: 20px;
      background: linear-gradient(180deg, rgba(124,156,255,0.16) 0%, rgba(124,156,255,0.06) 100%);
      border-color: rgba(124,156,255,0.22);
    }

    .weapon-display,
    .monster-display {
      border: 1px solid var(--line-strong);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 58%),
        linear-gradient(180deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.04) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 14px 32px rgba(0, 0, 0, 0.2);
      position: relative;
      overflow: hidden;
    }

    .weapon-display {
      width: 152px;
      height: 184px;
    }

    .monster-display {
      width: 100%;
      min-height: 250px;
      cursor: pointer;
      padding: 14px;
    }

    .weapon-display::after,
    .monster-display::after {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 18px;
      border: 1px dashed rgba(255,255,255,0.08);
      pointer-events: none;
    }

    .weapon-display.shake,
    .monster-display.hit {
      animation: shake 0.45s ease;
    }

    .weapon-display.success {
      animation: glowSuccess 0.75s ease;
    }

    .weapon-display.destroyed,
    .monster-display.dead {
      animation: flashDestroy 0.75s ease;
      opacity: 0.5;
    }

    #weaponArt,
    #monsterArt {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .info-box {
      width: min(100%, 240px);
      min-height: 120px;
      padding: 14px 16px;
      text-align: center;
      line-height: 1.65;
      background: linear-gradient(180deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.05) 100%);
      font-size: 0.97rem;
    }

    .info-box .row + .row {
      margin-top: 6px;
    }

    .attempt-box {
      min-width: 126px;
      text-align: center;
      cursor: pointer;
      background: linear-gradient(180deg, rgba(124,156,255,0.95) 0%, rgba(93,130,255,0.92) 100%);
      border-color: rgba(154, 177, 255, 0.35);
      color: #ffffff;
    }

    .attempt-box:hover:not(:disabled) {
      box-shadow:
        0 16px 28px rgba(42, 72, 170, 0.35),
        inset 0 1px 0 rgba(255,255,255,0.16);
      filter: brightness(1.04);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.52;
      transform: none !important;
    }

    .progress-wrap {
      width: min(100%, 228px);
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 2px;
    }

    .progress-wrap.active {
      display: flex;
    }

    .progress-label {
      font-size: 0.9rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.02em;
      color: var(--muted);
    }

    .progress-track,
    .hp-track {
      width: 100%;
      height: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.24);
    }

    .progress-fill,
    .hp-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.12s linear;
    }

    .progress-fill {
      width: 0%;
      background: linear-gradient(90deg, #66d19e 0%, #f3c95c 58%, #ff7a7a 100%);
    }

    .dungeon-view {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .dungeon-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .ground-chip {
      border: 1px solid var(--line-strong);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.05) 100%);
      padding: 10px 8px;
      text-align: center;
      cursor: pointer;
      font-weight: 700;
      color: var(--text);
      box-shadow: 0 10px 22px rgba(0,0,0,0.14);
    }

    .ground-chip small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 600;
    }

    .ground-chip.active {
      background: linear-gradient(180deg, rgba(124,156,255,0.2) 0%, rgba(124,156,255,0.08) 100%);
      border-color: rgba(124,156,255,0.4);
      box-shadow: 0 14px 28px rgba(42, 72, 170, 0.22);
    }

    .dungeon-panel {
      border: 1px solid var(--line-strong);
      border-radius: 24px;
      padding: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.04) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 14px 32px rgba(0,0,0,0.16);
    }

    .dungeon-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .dungeon-title {
      font-size: 1.08rem;
      font-weight: 800;
    }

    .dungeon-sub {
      color: var(--muted);
      font-size: 0.86rem;
      margin-top: 4px;
    }

    .reward-badge {
      border: 1px solid rgba(255, 224, 138, 0.2);
      background: rgba(255, 224, 138, 0.08);
      color: #ffe08a;
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 0.83rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .monster-card {
      width: 100%;
      border: none;
      padding: 0;
      background: transparent;
      cursor: pointer;
    }

    .monster-name {
      margin-top: 12px;
      text-align: center;
      font-size: 1.04rem;
      font-weight: 800;
    }

    .monster-hint {
      margin-top: 6px;
      text-align: center;
      font-size: 0.84rem;
      color: var(--muted);
    }

    .hp-section {
      margin-top: 14px;
    }

    .hp-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 700;
    }

    .hp-fill {
      width: 0%;
      background: linear-gradient(90deg, #6ae09b 0%, #ffd25d 60%, #ff7a7a 100%);
    }

    .dungeon-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .stat-card {
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      padding: 10px 8px;
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 0.96rem;
      font-weight: 800;
    }

    .footer-actions {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .small-btn {
      border: 1px solid var(--line-strong);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.05) 100%);
      padding: 9px 12px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(0,0,0,0.14);
    }

    .message {
      margin-top: 16px;
      min-height: 60px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.04) 100%);
      border: 1px solid var(--line-strong);
      border-radius: 18px;
      padding: 12px 14px;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 10px 24px rgba(0,0,0,0.15);
    }

    .message.success {
      color: #7ce4a5;
    }

    .message.fail {
      color: #ffc97a;
    }

    .message.destroy {
      color: #ff8d8d;
    }

    .hint {
      margin-top: 12px;
      font-size: 0.87rem;
      text-align: center;
      color: var(--muted);
    }

    .hint.hidden {
      display: none;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-4px); }
      30% { transform: translateX(4px); }
      45% { transform: translateX(-3px); }
      60% { transform: translateX(3px); }
      75% { transform: translateX(-2px); }
    }

    @keyframes glowSuccess {
      0% { box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 14px 32px rgba(0,0,0,0.2), 0 0 0 rgba(87, 199, 133, 0); }
      30% { box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 14px 32px rgba(0,0,0,0.2), 0 0 26px rgba(87, 199, 133, 0.45); }
      100% { box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 14px 32px rgba(0,0,0,0.2), 0 0 0 rgba(87, 199, 133, 0); }
    }

    @keyframes flashDestroy {
      0% { background: linear-gradient(180deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.04) 100%); }
      30% { background: linear-gradient(180deg, rgba(255,107,107,0.32) 0%, rgba(255,107,107,0.12) 100%); }
      100% { background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%); }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .game-frame {
        min-height: auto;
        padding: 16px 12px 20px;
        border-radius: 22px;
      }

      .weapon-display {
        width: 138px;
        height: 164px;
      }

      .dungeon-list,
      .dungeon-stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .top-actions {
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="game-frame">
    <section class="top-row">
      <div class="top-actions">
        <button id="sellBtn" class="outlined-box shop-box">무기 판매</button>
        <button id="modeBtn" class="outlined-box mode-box">던전</button>
      </div>
      <div id="goldBox" class="outlined-box gold-box">골드 1,000</div>
    </section>

    <section class="content-area">
      <section id="enhanceView" class="view active">
        <div class="center-area">
          <div id="weaponName" class="outlined-box weapon-name-box">+0 낡은 검</div>

          <div id="weaponDisplay" class="weapon-display" aria-label="현재 무기">
            <div id="weaponArt"></div>
          </div>

          <div id="infoBox" class="outlined-box info-box">
            <div class="row">강화 100% / 유지 0% / 파괴 0%</div>
            <div class="row">소모 골드 100 · 일반</div>
            <div class="row">공격력 2</div>
          </div>

          <div id="progressWrap" class="progress-wrap" aria-live="polite">
            <div id="progressLabel" class="progress-label">고강화 긴장도</div>
            <div class="progress-track">
              <div id="progressFill" class="progress-fill"></div>
            </div>
          </div>

          <button id="attemptBtn" class="outlined-box attempt-box">강화 시도</button>
        </div>

        <div class="footer-actions">
          <button id="buyBtn" class="small-btn">새 무기 구매</button>
          <button id="resetBtn" class="small-btn">초기화</button>
        </div>
      </section>

      <section id="dungeonView" class="view">
        <div class="dungeon-view">
          <div id="groundList" class="dungeon-list"></div>

          <div class="dungeon-panel">
            <div class="dungeon-header">
              <div>
                <div id="groundTitle" class="dungeon-title">초원</div>
                <div id="groundRecommend" class="dungeon-sub">추천 강화 +0 ~ +2</div>
              </div>
              <div id="rewardBadge" class="reward-badge">보상 25 골드</div>
            </div>

            <button id="monsterBtn" class="monster-card" type="button">
              <div id="monsterDisplay" class="monster-display" aria-label="몬스터를 클릭해 공격">
                <div id="monsterArt"></div>
              </div>
            </button>

            <div id="monsterName" class="monster-name">들쥐 슬라임</div>
            <div class="monster-hint">몬스터를 클릭하면 현재 무기의 공격력으로 피해를 줍니다.</div>

            <div class="hp-section">
              <div class="hp-label">
                <span>몬스터 체력</span>
                <span id="monsterHpText">12 / 12</span>
              </div>
              <div class="hp-track">
                <div id="monsterHpFill" class="hp-fill"></div>
              </div>
            </div>

            <div class="dungeon-stats">
              <div class="stat-card">
                <div class="stat-label">플레이어 공격력</div>
                <div id="playerAtkValue" class="stat-value">2</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">몬스터 방어력</div>
                <div id="monsterDefValue" class="stat-value">0</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">예상 피해</div>
                <div id="damageValue" class="stat-value">2</div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </section>

    <div id="message" class="message">검을 강화해 최고 단계에 도전하거나, 던전에서 골드를 수급하세요.</div>
    <div id="hint" class="hint">7강 이상부터는 결과가 늦게 공개됩니다. 새 무기 구매는 판매 또는 파괴 이후에 가능합니다.</div>
  </main>

            <path d="M168 88 L 186 70 L 170 62" fill="none" stroke="#7f6bca" stroke-width="5" stroke-linecap="round"/>
            <path d="M92 166 L 82 188" fill="none" stroke="#5b4ba2" stroke-width="5" stroke-linecap="round"/>
            <path d="M148 166 L 158 188" fill="none" stroke="#5b4ba2" stroke-width="5" stroke-linecap="round"/>
          </svg>
        `;
      }

      return `
        <svg viewBox="0 0 240 220" width="206" height="182" aria-hidden="true" style="transform: scale(${pulse}); filter: drop-shadow(0 12px 18px rgba(0,0,0,0.38));">
          <ellipse cx="120" cy="182" rx="74" ry="14" fill="rgba(0,0,0,0.32)"/>
          <circle cx="120" cy="100" r="56" fill="rgba(255, 110, 72, 0.16)"/>
          <path d="M74 164 C 66 110, 82 62, 120 56 C 158 62, 174 110, 166 164 Z" fill="#8e1f14" stroke="#ff8a57" stroke-width="5"/>
          <path d="M92 64 L 78 36 L 100 46 Z" fill="#ff9a6e"/>
          <path d="M148 64 L 162 36 L 140 46 Z" fill="#ff9a6e"/>
          <circle cx="102" cy="114" r="9" fill="#ffe68c"/>
          <circle cx="138" cy="114" r="9" fill="#ffe68c"/>
          <path d="M102 144 L 114 156 L 126 144 L 138 156" fill="none" stroke="#ffd2a6" stroke-width="5" stroke-linecap="round"/>
          <path d="M92 176 L 78 200" fill="none" stroke="#ff7a52" stroke-width="6" stroke-linecap="round"/>
          <path d="M148 176 L 162 200" fill="none" stroke="#ff7a52" stroke-width="6" stroke-linecap="round"/>
        </svg>
      `;
    }

    function clearAnimations() {
      weaponDisplay.classList.remove('shake', 'success', 'destroyed');
      monsterDisplay.classList.remove('hit', 'dead');
      void weaponDisplay.offsetWidth;
    }

    function renderWeaponVisual() {
      weaponArt.innerHTML = getWeaponSVG(state.weaponType, state.weaponLevel, state.destroyed);
    }

    function renderProgressState() {
      const highLevel = state.weaponLevel >= 7 && !state.destroyed;
      progressWrap.classList.toggle('active', highLevel);
      progressFill.style.width = '0%';
      progressLabel.textContent = highLevel
        ? `+${state.weaponLevel} → +${state.weaponLevel + 1} 긴장도`
        : '고강화 긴장도';
    }

    function renderEnhance() {
      const weapon = getWeaponData();

      if (state.destroyed) {
        weaponName.textContent = '파괴된 무기';
        infoBox.innerHTML = `
          <div class="row">강화 불가 / 판매만 가능</div>
          <div class="row">현재 공격력 0</div>
          <div class="row">새 무기 구매 300 골드</div>
        `;
        attemptBtn.disabled = true;
      } else if (state.weaponLevel >= state.maxLevel) {
        weaponName.textContent = currentWeaponText();
        infoBox.innerHTML = `
          <div class="row">최종 강화 달성 · ${weapon.rarityName}</div>
          <div class="row">공격력 ${getCurrentAtk()}</div>
          <div class="row">판매가 ${formatGold(getSellPrice())}</div>
        `;
        attemptBtn.disabled = true;
      } else {
        const data = getCurrentData();
        weaponName.textContent = currentWeaponText();
        infoBox.innerHTML = `
          <div class="row">강화 ${data.success}% / 유지 ${data.keep}% / 파괴 ${data.destroy}%</div>
          <div class="row">소모 골드 ${formatGold(data.cost)} · ${weapon.rarityName}</div>
          <div class="row">공격력 ${getCurrentAtk()}</div>
        `;
        attemptBtn.disabled = state.busy;
      }

      buyBtn.disabled = !state.destroyed || state.gold < 300 || state.busy || state.monsterBusy;
      resetBtn.disabled = state.busy || state.monsterBusy;
      sellBtn.disabled = state.busy || state.monsterBusy;

      renderProgressState();
      renderWeaponVisual();
    }

    function renderGroundButtons() {
      groundList.innerHTML = huntingGrounds.map((ground, index) => `
        <button class="ground-chip ${index === state.selectedGround ? 'active' : ''}" data-index="${index}" type="button">
          ${ground.name}
          <small>${ground.recommend}</small>
        </button>
      `).join('');

      groundList.querySelectorAll('.ground-chip').forEach((button) => {
        button.addEventListener('click', () => {
          if (state.monsterBusy) return;
          state.selectedGround = Number(button.dataset.index);
          state.monsterHp = getGround().hp;
          renderDungeon();
        });
      });
    }

    function renderMonster() {
      const ground = getGround();
      const ratio = Math.max(0, state.monsterHp) / ground.hp;
      monsterArt.innerHTML = getMonsterSVG(ground.theme, ratio);
      monsterName.textContent = ground.monsterName;
      monsterHpText.textContent = `${state.monsterHp} / ${ground.hp}`;
      monsterHpFill.style.width = `${Math.max(0, ratio) * 100}%`;
      playerAtkValue.textContent = `${getCurrentAtk()}`;
      monsterDefValue.textContent = `${ground.def}`;
      damageValue.textContent = `${getDamage(getCurrentAtk(), ground.def)}`;
      monsterBtn.disabled = state.monsterBusy;
    }

    function renderDungeon() {
      const ground = getGround();
      groundTitle.textContent = ground.name;
      groundRecommend.textContent = `추천 강화 ${ground.recommend}`;
      rewardBadge.textContent = `보상 ${formatGold(ground.gold)} 골드`;
      renderGroundButtons();
      renderMonster();
    }

    function renderView() {
      const isDungeon = state.currentView === 'dungeon';
      enhanceView.classList.toggle('active', !isDungeon);
      dungeonView.classList.toggle('active', isDungeon);
      modeBtn.textContent = isDungeon ? '강화' : '던전';
      modeBtn.classList.toggle('active', isDungeon);
      hint.textContent = isDungeon
        ? '지역에 맞는 몬스터를 클릭해 처치하면 골드를 얻습니다. 예상 피해가 0이면 더 강한 무기가 필요합니다.'
        : '7강 이상부터는 결과가 늦게 공개됩니다. 새 무기 구매는 판매 또는 파괴 이후에 가능합니다.';
    }

    function render() {
      goldBox.textContent = `골드 ${formatGold(state.gold)}`;
      renderEnhance();
      renderDungeon();
      renderView();
    }

    function randomOutcome({ success, keep }) {
      const roll = Math.random() * 100;
      if (roll < success) return 'success';
      if (roll < success + keep) return 'keep';
      return 'destroy';
    }

    function rollNewWeapon() {
      const roll = Math.random();
      let acc = 0;
      for (const item of purchasePool) {
        acc += item.chance;
        if (roll <= acc) return item.key;
      }
      return 'staff';
    }

    function applyOutcome(outcome) {
      clearAnimations();

      if (outcome === 'success') {
        state.weaponLevel += 1;
        weaponDisplay.classList.add('success');
        setMessage(`강화 성공. ${currentWeaponText()}이 되었습니다. 공격력은 ${getCurrentAtk()}입니다.`, 'success');
        if (state.weaponLevel >= state.maxLevel) {
          setMessage(`축하합니다. ${currentWeaponText()} 완성. 최종 공격력은 ${getCurrentAtk()}입니다.`, 'success');
        }
      } else if (outcome === 'keep') {
        weaponDisplay.classList.add('shake');
        setMessage(`강화 실패. 단계는 유지되었습니다. 현재 공격력은 ${getCurrentAtk()}입니다.`, 'fail');
      } else {
        state.destroyed = true;
        weaponDisplay.classList.add('destroyed');
        setMessage('강화 실패. 무기가 파괴되었습니다.', 'destroy');
      }

      state.busy = false;
      render();
    }

    function playProgressThenResolve(data) {
      state.busy = true;
      attemptBtn.disabled = true;
      sellBtn.disabled = true;
      buyBtn.disabled = true;
      resetBtn.disabled = true;
      progressWrap.classList.add('active');
      progressFill.style.width = '0%';
      progressLabel.textContent = `+${state.weaponLevel} → +${state.weaponLevel + 1} 판정 중...`;
      setMessage('숨을 고르세요... 결과를 확인하는 중입니다.');
      clearAnimations();
      weaponDisplay.classList.add('shake');

      const duration = 1500 + state.weaponLevel * 150;
      const start = performance.now();
      const outcome = randomOutcome(data);

      function tick(now) {
        const progress = Math.min((now - start) / duration, 1);
        progressFill.style.width = `${(progress * 100).toFixed(1)}%`;
        if (progress < 1) {
          requestAnimationFrame(tick);
        } else {
          applyOutcome(outcome);
        }
      }

      requestAnimationFrame(tick);
    }

    function tryEnhance() {
      if (state.destroyed || state.busy || state.weaponLevel >= state.maxLevel || state.monsterBusy) return;

      const data = getCurrentData();
      if (state.gold < data.cost) {
        setMessage('골드가 부족합니다.', 'fail');
        return;
      }

      state.gold -= data.cost;
      render();

      if (state.weaponLevel >= 7) {
        playProgressThenResolve(data);
        return;
      }

      const outcome = randomOutcome(data);
      applyOutcome(outcome);
    }

    function sellWeapon() {
      if (state.busy || state.monsterBusy) return;

      if (state.destroyed) {
        state.gold += 40;
        setMessage('파괴된 무기의 잔해를 40 골드에 판매했습니다. 새 무기를 구매하세요.');
      } else {
        const price = getSellPrice();
        state.gold += price;
        setMessage(`${currentWeaponText()}을 ${formatGold(price)} 골드에 판매했습니다.`, 'success');
      }

      state.weaponLevel = 0;
      state.destroyed = true;
      render();
    }

    function buyWeapon() {
      if (state.busy || state.monsterBusy) return;
      if (!state.destroyed) {
        setMessage('현재 무기를 먼저 판매하거나 파괴된 상태여야 새 무기를 살 수 있습니다.');
        return;
      }
      if (state.gold < 300) {
        setMessage('새 무기 구매에 필요한 300 골드가 부족합니다.', 'fail');
        return;
      }

      state.gold -= 300;
      state.weaponType = rollNewWeapon();
      state.weaponLevel = 0;
      state.destroyed = false;
      clearAnimations();

      const weapon = getWeaponData();
      if (weapon.key === 'staff') {
        setMessage(`희귀 아이템 등장. ${weapon.buyLabel}을 획득했습니다. 공격력은 ${getCurrentAtk()}이며 판매 가격은 5배입니다.`, 'success');
      } else {
        setMessage(`${weapon.buyLabel}을 획득했습니다. 현재 공격력은 ${getCurrentAtk()}입니다.`, 'success');
      }
      render();
    }

    function resetGame() {
      state.gold = 1000;
      state.weaponType = 'sword';
      state.weaponLevel = 0;
      state.destroyed = false;
      state.busy = false;
      state.currentView = 'enhance';
      state.selectedGround = 0;
      state.monsterHp = huntingGrounds[0].hp;
      state.monsterBusy = false;
      clearAnimations();
      setMessage('게임을 초기화했습니다. 시작 무기는 낡은 검이며 공격력은 2입니다.');
      render();
    }

    function toggleView() {
      if (state.busy || state.monsterBusy) return;
      state.currentView = state.currentView === 'enhance' ? 'dungeon' : 'enhance';
      render();
    }

    function attackMonster() {
      if (state.busy || state.monsterBusy) return;
      if (state.destroyed) {
        setMessage('무기가 파괴되어 사냥할 수 없습니다. 새 무기를 구매하세요.', 'fail');
        return;
      }

      const ground = getGround();
      const playerAtk = getCurrentAtk();
      const damage = getDamage(playerAtk, ground.def);

      clearAnimations();
      monsterDisplay.classList.add('hit');

      if (damage <= 0) {
        setMessage(`${ground.monsterName}의 방어력이 너무 높아 피해를 주지 못했습니다.`, 'fail');
        renderDungeon();
        return;
      }

      state.monsterHp = Math.max(0, state.monsterHp - damage);

      if (state.monsterHp <= 0) {
        state.monsterBusy = true;
        monsterDisplay.classList.add('dead');
        const reward = ground.gold;
        state.gold += reward;
        setMessage(`${ground.monsterName} 처치. ${formatGold(reward)} 골드를 획득했습니다.`, 'success');
        render();

        setTimeout(() => {
          state.monsterHp = ground.hp;
          state.monsterBusy = false;
          clearAnimations();
          render();
        }, 520);
        return;
      }

      setMessage(`${ground.monsterName}에게 ${damage} 피해를 주었습니다. 남은 체력은 ${state.monsterHp}입니다.`, 'success');
      render();
    }

    sellBtn.addEventListener('click', sellWeapon);
    modeBtn.addEventListener('click', toggleView);
    attemptBtn.addEventListener('click', tryEnhance);
    buyBtn.addEventListener('click', buyWeapon);
    resetBtn.addEventListener('click', resetGame);
    monsterBtn.addEventListener('click', attackMonster);

    render();
  </script>
</body>
</html>
